
<!DOCTYPE html>
<html lang="en" class="dark" style="scroll-behavior: smooth;">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUH4RHQ | API Engineer & Bot Dev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #2563EB;
            --neon-glow: rgba(37, 99, 235, 0.5);
            --bg: #18181B;
            --text: #FAFAFA;
            --secondary: #3F3F46;
        }
        body {
            font-family: 'Archivo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            cursor: none;
            -webkit-font-smoothing: antialiased;
        }
        .font-space { font-family: 'Space Grotesk', sans-serif; }
        
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            opacity: 0.03;
            z-index: 9999;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(to right, rgba(37, 99, 235, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(37, 99, 235, 0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: -1;
            pointer-events: none;
        }

        #custom-cursor {
            width: 8px;
            height: 8px;
            background: var(--neon);
            border-radius: 2px;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.08s linear, background 0.3s;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px var(--neon-glow);
        }
        
        #cursor-follower {
            width: 44px;
            height: 44px;
            border: 1px solid rgba(37, 99, 235, 0.2);
            border-radius: 4px;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: width 0.4s cubic-bezier(0.16, 1, 0.3, 1), height 0.4s cubic-bezier(0.16, 1, 0.3, 1), left 0.2s cubic-bezier(0.16, 1, 0.3, 1), top 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s;
            transform: translate(-50%, -50%);
        }

        .cursor-hover #custom-cursor {
            width: 80px;
            height: 80px;
            background: var(--neon);
            mix-blend-mode: overlay;
            border-radius: 50%;
        }
        
        .cursor-hover #cursor-follower {
            width: 100px;
            height: 100px;
            opacity: 0;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon); }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        .scanline {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(to bottom, transparent, rgba(37, 99, 235, 0.05), transparent);
            z-index: 9998;
            pointer-events: none;
            animation: scan 10s linear infinite;
        }

        @keyframes glitch {
            0% { clip-path: inset(80% 0 0 0); transform: translate(-2px, -2px); }
            10% { clip-path: inset(10% 0 85% 0); transform: translate(2px, 2px); }
            20% { clip-path: inset(80% 0 0 0); transform: translate(-2px, -2px); }
            30% { clip-path: inset(10% 0 85% 0); transform: translate(2px, 2px); }
            40% { clip-path: inset(50% 0 30% 0); transform: translate(-2px, -2px); }
            50% { clip-path: inset(10% 0 85% 0); transform: translate(2px, 2px); }
            60% { clip-path: inset(80% 0 0 0); transform: translate(-2px, -2px); }
            70% { clip-path: inset(10% 0 85% 0); transform: translate(2px, 2px); }
            80% { clip-path: inset(50% 0 30% 0); transform: translate(-2px, -2px); }
            90% { clip-path: inset(10% 0 85% 0); transform: translate(2px, 2px); }
            100% { clip-path: inset(80% 0 0 0); transform: translate(-2px, -2px); }
        }

        .glitch-text:hover {
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            text-shadow: 2px 0 #ff00c1, -2px 0 #00fff9;
        }

        * {
          outline: none !important;
          -webkit-tap-highlight-color: transparent;
        }
        
        ::selection { background: var(--neon); color: white; }
        ::-moz-selection { background: var(--neon); color: white; }

        .reveal-text {
            clip-path: inset(0 0 100% 0);
        }
    
        /* Campuran / Mixed Gradient */
        .text-accent {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        .bg-accent {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%) !important;
            color: white !important;
        }
        .border-accent {
            border-color: #00f2fe !important;
        }
        .accent-glow {
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4) !important;
        }
        .group:hover .group-hover\:text-accent {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        .group:hover .group-hover\:bg-accent {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%) !important;
            color: white !important;
        }
        .group:hover .group-hover\:border-accent {
            border-color: #00f2fe !important;
        }
        .hover\:text-accent:hover {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

</style>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: {
                DEFAULT: '#8b5cf6', // Violet
                hover: '#a78bfa',
                glow: 'rgba(139, 92, 246, 0.5)'
              }
            }
          }
        }
      }
    </script>
    
</head>
<body>
    <div class="noise"></div>
    <div class="grid-bg"></div>
    <div class="scanline"></div>
    <div id="custom-cursor"></div>
    <div id="cursor-follower"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
